<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDQ — Area Educatore</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:15px;}
.container{max-width:740px;margin:0 auto;padding:1.5rem 1rem 4rem;}
h1{font-size:22px;font-weight:600;margin-bottom:4px;}
h2{font-size:18px;font-weight:600;margin-bottom:12px;}
h3{font-size:15px;font-weight:600;margin-bottom:8px;}
.sub{font-size:14px;color:#666;margin-bottom:1.5rem;}
.card{background:#fff;border-radius:12px;padding:1.25rem;margin-bottom:1rem;border:1px solid #e8e8e6;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:13px;color:#666;font-weight:500;}
.field input{border:1px solid #d0d0ce;border-radius:8px;padding:10px 12px;font-size:15px;background:#fff;color:#1a1a1a;width:100%;}
.field input:focus{outline:none;border-color:#1D9E75;}
.btn{padding:11px 20px;font-size:14px;font-weight:600;border-radius:9px;border:none;cursor:pointer;display:inline-block;}
.btn-full{width:100%;display:block;margin-top:.75rem;}
.btn-primary{background:#1D9E75;color:#fff;}
.btn-primary:hover{background:#0F6E56;}
.btn-secondary{background:#f0f0ee;color:#444;}
.btn-secondary:hover{background:#e4e4e2;}
.btn-danger{background:#fdf0ef;color:#c0392b;border:1px solid #f5c6c2;}
.btn-sm{padding:6px 14px;font-size:12px;}
.warn{font-size:13px;color:#c0392b;padding:10px 12px;background:#fdf0ef;border-radius:8px;display:none;margin-top:8px;}
.lock-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:1rem;text-align:center;}
.lock-icon{width:64px;height:64px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;font-size:30px;}
.pin-input{text-align:center;font-size:24px;letter-spacing:10px;width:180px;border:1px solid #d0d0ce;border-radius:10px;padding:12px;background:#fff;color:#1a1a1a;}
.pin-input:focus{outline:none;border-color:#1D9E75;}
.nav-tabs{display:flex;gap:6px;margin-bottom:1.5rem;border-bottom:1px solid #e8e8e6;padding-bottom:1rem;flex-wrap:wrap;}
.tab-btn{padding:7px 16px;font-size:13px;font-weight:500;border-radius:8px;border:1px solid #e0e0de;background:transparent;color:#666;cursor:pointer;}
.tab-btn.act{background:#f0faf6;color:#0F6E56;border-color:#1D9E75;}
.tab-pane{display:none;}
.tab-pane.act{display:block;}
.entry-card{background:#fff;border-radius:10px;padding:12px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;border:1px solid #e8e8e6;transition:border-color .15s;}
.entry-card:hover{border-color:#1D9E75;}
.entry-name{font-size:15px;font-weight:600;color:#1a1a1a;}
.entry-meta{font-size:12px;color:#888;margin-top:3px;}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;}
.bn{background:#E1F5EE;color:#085041;}
.bb{background:#FAC775;color:#633806;}
.be{background:#FCEBEB;color:#791F1F;}
.b-ES{background:#E1F5EE;color:#085041;}
.b-IP{background:#FAC775;color:#633806;}
.b-EC{background:#F5C4B3;color:#712B13;}
.b-C{background:#B5D4F4;color:#0C447C;}
.b-PR{background:#EEEDFE;color:#3C3489;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:flex-start;justify-content:center;padding:1.5rem 1rem;overflow-y:auto;z-index:100;}
.modal{background:#fff;border-radius:16px;padding:1.5rem;max-width:680px;width:100%;margin-bottom:2rem;}
.modal-tabs{display:flex;gap:6px;margin-bottom:1rem;border-bottom:1px solid #e8e8e6;padding-bottom:.75rem;flex-wrap:wrap;}
.modal-tab{padding:6px 14px;font-size:13px;font-weight:500;border-radius:8px;border:1px solid #e0e0de;background:transparent;color:#666;cursor:pointer;}
.modal-tab.act{background:#f0faf6;color:#0F6E56;border-color:#1D9E75;}
.det-pane{display:none;}
.det-pane.act{display:block;}
.scale-row{display:grid;grid-template-columns:150px 1fr 55px 95px;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f0f0ee;}
.scale-row:last-child{border-bottom:none;}
.bar-bg{background:#f0f0ee;border-radius:4px;height:8px;overflow:hidden;}
.bar-fill{height:8px;border-radius:4px;}
.rel-section{margin-bottom:1.25rem;}
.rel-section h4{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #f0f0ee;}
.rel-section p{font-size:13px;color:#555;line-height:1.7;}
.interp-block{margin-bottom:.85rem;padding:12px;border-radius:9px;border-left:3px solid #ccc;background:#f8f8f7;}
.interp-block .interp-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.interp-block p{font-size:13px;color:#555;line-height:1.65;}
.impact-table td{padding:7px 0;font-size:13px;border-bottom:1px solid #f0f0ee;}
.impact-table td:first-child{color:#888;width:55%;}
.impact-table td:last-child{font-weight:600;text-align:right;}
.impact-table tr:last-child td{border-bottom:none;}
.lbl{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.07em;margin:1.25rem 0 .5rem;}
.lbl:first-child{margin-top:0;}
.empty{text-align:center;padding:2.5rem;color:#999;font-size:14px;}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid #1D9E75;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-center{display:flex;justify-content:center;padding:2rem;}
.divider{height:1px;background:#f0f0ee;margin:1rem 0;}
</style>
</head>
<body>
<div class="container">

  <div id="screen-login">
    <div class="lock-screen">
      <div class="lock-icon">🔒</div>
      <h2>Area valutatore</h2>
      <p class="sub">Inserisci il PIN per accedere ai risultati</p>
      <input class="pin-input" type="password" id="pin-in" maxlength="6" placeholder="••••••" inputmode="numeric">
      <p class="warn" id="pin-warn">PIN errato. Riprova.</p>
      <button class="btn btn-primary" style="max-width:220px;width:100%;" onclick="checkPin()">Accedi</button>
      <p style="font-size:12px;color:#aaa;margin-top:.5rem;">PIN predefinito: <strong style="color:#444;">1234</strong></p>
    </div>
  </div>

  <div id="screen-dash" style="display:none;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
      <h1>SDQ — Area valutatore</h1>
      <button class="btn btn-secondary btn-sm" onclick="logout()">Esci</button>
    </div>
    <div class="nav-tabs">
      <button class="tab-btn act" onclick="switchTab(this,'tab-list')">Questionari</button>
      <button class="tab-btn" onclick="switchTab(this,'tab-settings')">Impostazioni</button>
    </div>

    <div id="tab-list" class="tab-pane act">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
        <h2 style="margin:0;">Compilazioni ricevute</h2>
        <button class="btn btn-secondary btn-sm" onclick="loadEntries()">↻ Aggiorna</button>
      </div>
      <div id="entries-list"><div class="loading-center"><div class="spinner"></div></div></div>
    </div>

    <div id="tab-settings" class="tab-pane">
      <h2>Impostazioni</h2>
      <div class="card">
        <p class="lbl">Cambia PIN</p>
        <div style="display:flex;flex-direction:column;gap:8px;max-width:260px;">
          <div class="field"><label>PIN attuale</label><input type="password" id="old-pin" maxlength="6" inputmode="numeric"></div>
          <div class="field"><label>Nuovo PIN (min. 4 cifre)</label><input type="password" id="new-pin" maxlength="6" inputmode="numeric"></div>
          <div class="field"><label>Conferma nuovo PIN</label><input type="password" id="conf-pin" maxlength="6" inputmode="numeric"></div>
        </div>
        <p class="warn" id="pin-ch-warn"></p>
        <p id="pin-ch-ok" style="font-size:12px;color:#0F6E56;display:none;margin-top:6px;">PIN aggiornato!</p>
        <button class="btn btn-primary" style="margin-top:12px;" onclick="changePin()">Aggiorna PIN</button>
      </div>
    </div>
  </div>

</div>

<div id="modal-wrap" style="display:none;">
  <div class="modal-bg" onclick="closeModalBg(event)">
    <div class="modal">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem;">
        <div id="det-header"></div>
        <button onclick="closeModal()" style="font-size:24px;cursor:pointer;color:#aaa;background:none;border:none;line-height:1;padding:0 0 0 12px;">×</button>
      </div>
      <div class="modal-tabs">
        <button class="modal-tab act" onclick="detTab(this,'dp-scale')">Scale SDQ</button>
        <button class="modal-tab" onclick="detTab(this,'dp-radar')">Grafico radar</button>
        <button class="modal-tab" onclick="detTab(this,'dp-interp')">Interpretazione</button>
        <button class="modal-tab" onclick="detTab(this,'dp-rel')">Relazione</button>
        <button class="modal-tab" onclick="detTab(this,'dp-impact')">Impatto</button>
      </div>
      <div id="dp-scale" class="det-pane act"></div>
      <div id="dp-radar" class="det-pane"><div style="position:relative;width:100%;height:300px;"><canvas id="radar-canvas"></canvas></div></div>
      <div id="dp-interp" class="det-pane"></div>
      <div id="dp-rel" class="det-pane"></div>
      <div id="dp-impact" class="det-pane"></div>
      <div style="margin-top:1.25rem;border-top:1px solid #f0f0ee;padding-top:1rem;">
        <button class="btn btn-danger btn-sm" onclick="deleteEntry()">Elimina compilazione</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBmsHeTkQMJVQyav3rF8VPMhLeIB45t3Io",
  authDomain: "sdq-questionario.firebaseapp.com",
  projectId: "sdq-questionario",
  storageBucket: "sdq-questionario.firebasestorage.app",
  messagingSenderId: "601788476480",
  appId: "1:601788476480:web:766d7dd791fa44acbd83a5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const SLBL={ES:"Sintomi Emotivi",IP:"Iperattività",EC:"Prob. Condotta",C:"Prob. Relazioni",PR:"Prosociale",TOT:"Tot. Difficoltà",INT:"Internalizzazione",EST:"Esternalizzazione"};
const BAR_COL={ES:"#1D9E75",IP:"#BA7517",EC:"#993C1D",C:"#185FA5",PR:"#534AB7"};
const SC_COL={ES:"b-ES",IP:"b-IP",EC:"b-EC",C:"b-C",PR:"b-PR"};

function getBand(s,v){
  if(s==="PR"){if(v>=6)return"adeguato";if(v===5)return"borderline";return"basso";}
  if(s==="TOT"){if(v<=15)return"normale";if(v<=19)return"borderline";return"elevato";}
  if(s==="INT"){if(v<=5)return"normale";if(v<=7)return"borderline";return"elevato";}
  if(s==="EST"){if(v<=5)return"normale";if(v<=7)return"borderline";return"elevato";}
  const r={ES:[3,5],IP:[5,7],EC:[2,3],C:[2,3]}[s];
  if(v<=r[0])return"normale";if(v<=r[1])return"borderline";return"elevato";
}
function bClass(b){return b==="normale"||b==="adeguato"?"bn":b==="borderline"?"bb":"be";}
function bLabel(b){return{normale:"Nella norma",adeguato:"Adeguato",borderline:"Borderline",basso:"Basso",elevato:"Elevato"}[b];}
function getPin(){return localStorage.getItem("sdq_edu_pin")||"1234";}

window.checkPin=function(){
  const v=document.getElementById("pin-in").value;
  if(v===getPin()){
    document.getElementById("pin-warn").style.display="none";
    document.getElementById("pin-in").value="";
    document.getElementById("screen-login").style.display="none";
    document.getElementById("screen-dash").style.display="block";
    loadEntries();
  } else {document.getElementById("pin-warn").style.display="block";}
};
document.getElementById("pin-in").addEventListener("keydown",e=>{if(e.key==="Enter")window.checkPin();});

window.logout=function(){document.getElementById("screen-dash").style.display="none";document.getElementById("screen-login").style.display="block";};

window.switchTab=function(btn,id){
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("act"));
  btn.classList.add("act");
  document.querySelectorAll(".tab-pane").forEach(p=>p.classList.remove("act"));
  document.getElementById(id).classList.add("act");
};

let allEntries=[];
window.loadEntries=async function(){
  const el=document.getElementById("entries-list");
  el.innerHTML='<div class="loading-center"><div class="spinner"></div></div>';
  try {
    const q=collection(db,"risposte");
    const snap=await getDocs(q);
    allEntries=[];
    snap.forEach(d=>allEntries.push({id:d.id,...d.data()}));
    renderList();
  } catch(e){
    el.innerHTML='<div class="empty">Errore nel caricamento. Riprova.</div>';
  }
};

function renderList(){
  const el=document.getElementById("entries-list");
  if(!allEntries.length){el.innerHTML='<div class="empty">Nessun questionario compilato ancora.</div>';return;}
  el.innerHTML=allEntries.map(e=>{
    const bd=getBand("TOT",e.tot);
    return`<div class="entry-card" onclick="openDetail('${e.id}')">
      <div>
        <div class="entry-name">${e.nome}</div>
        <div class="entry-meta">${e.data}${e.sesso?" · "+e.sesso:""} · Tot. difficoltà: <strong>${e.tot}</strong> <span class="badge ${bClass(bd)}">${bLabel(bd)}</span></div>
      </div>
      <span style="color:#ccc;font-size:20px;">›</span>
    </div>`;
  }).join("");
}

let currentEntry=null;let radarChart=null;

window.openDetail=function(id){
  currentEntry=allEntries.find(e=>e.id===id);
  if(!currentEntry)return;
  document.getElementById("det-header").innerHTML=`<div style="font-size:17px;font-weight:600;">${currentEntry.nome}</div><div style="font-size:12px;color:#888;margin-top:2px;">${currentEntry.data}${currentEntry.sesso?" · "+currentEntry.sesso:""}${currentEntry.ddn?" · Nato/a: "+currentEntry.ddn:""}</div>`;
  renderScale();renderInterp();renderRelazione();renderImpact();
  if(radarChart){radarChart.destroy();radarChart=null;}
  ["dp-scale","dp-radar","dp-interp","dp-rel","dp-impact"].forEach(t=>document.getElementById(t).classList.remove("act"));
  document.getElementById("dp-scale").classList.add("act");
  document.querySelectorAll(".modal-tab").forEach((b,i)=>{b.classList.remove("act");if(i===0)b.classList.add("act");});
  document.getElementById("modal-wrap").style.display="block";
  document.body.style.overflow="hidden";
};

window.detTab=function(btn,id){
  document.querySelectorAll(".modal-tab").forEach(b=>b.classList.remove("act"));
  btn.classList.add("act");
  ["dp-scale","dp-radar","dp-interp","dp-rel","dp-impact"].forEach(t=>document.getElementById(t).classList.remove("act"));
  document.getElementById(id).classList.add("act");
  if(id==="dp-radar")renderRadar();
};

window.closeModal=function(){document.getElementById("modal-wrap").style.display="none";document.body.style.overflow="";if(radarChart){radarChart.destroy();radarChart=null;}};
window.closeModalBg=function(e){if(e.target===e.currentTarget)window.closeModal();};

function renderScale(){
  const e=currentEntry;
  let html='<p class="lbl">Punteggi per scala</p>';
  ["ES","IP","EC","C","PR"].forEach(s=>{
    const v=e.scores[s];const pct=Math.round(v/10*100);const bd=getBand(s,v);
    html+=`<div class="scale-row"><div><span class="badge ${SC_COL[s]}">${s}</span><div style="font-size:12px;color:#888;margin-top:3px;">${SLBL[s]}</div></div><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${BAR_COL[s]};"></div></div><div style="font-size:16px;font-weight:600;text-align:center;">${v}<span style="font-size:11px;color:#aaa;">/10</span></div><div style="text-align:right;"><span class="badge ${bClass(bd)}">${bLabel(bd)}</span></div></div>`;
  });
  const totBd=getBand("TOT",e.tot);
  const intV=e.scores.ES+e.scores.C; const estV=e.scores.EC+e.scores.IP;
  const intBd=getBand("INT",intV); const estBd=getBand("EST",estV);
  html+=`<div style="margin-top:1rem;padding:12px;background:#f8f8f7;border-radius:9px;display:flex;justify-content:space-between;align-items:center;"><div style="font-size:13px;font-weight:600;color:#666;">Punteggio totale difficoltà (ES+IP+EC+C)</div><div style="display:flex;align-items:center;gap:10px;"><span style="font-size:26px;font-weight:700;">${e.tot}<span style="font-size:13px;color:#aaa;font-weight:400;">/40</span></span><span class="badge ${bClass(totBd)}">${bLabel(totBd)}</span></div></div>`;
  html+=`<div style="margin-top:8px;display:grid;grid-template-columns:1fr 1fr;gap:8px;">
    <div style="padding:12px;background:#f0faf6;border-radius:9px;border-left:3px solid #1D9E75;">
      <div style="font-size:11px;font-weight:600;color:#0F6E56;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;">Internalizzazione</div>
      <div style="font-size:11px;color:#555;margin-bottom:6px;">Sintomi Emotivi + Prob. Relazioni</div>
      <div style="display:flex;align-items:center;gap:8px;"><span style="font-size:22px;font-weight:700;">${intV}<span style="font-size:11px;color:#aaa;font-weight:400;">/20</span></span><span class="badge ${bClass(intBd)}">${bLabel(intBd)}</span></div>
    </div>
    <div style="padding:12px;background:#fff8f0;border-radius:9px;border-left:3px solid #BA7517;">
      <div style="font-size:11px;font-weight:600;color:#854F0B;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;">Esternalizzazione</div>
      <div style="font-size:11px;color:#555;margin-bottom:6px;">Prob. Condotta + Iperattività</div>
      <div style="display:flex;align-items:center;gap:8px;"><span style="font-size:22px;font-weight:700;">${estV}<span style="font-size:11px;color:#aaa;font-weight:400;">/20</span></span><span class="badge ${bClass(estBd)}">${bLabel(estBd)}</span></div>
    </div>
  </div>`;
  // commento internalizzazione/esternalizzazione
  let commINT_EST="";
  if(intBd==="normale"&&estBd==="normale"){
    commINT_EST=`Il profilo non mostra difficoltà significative né sul versante internalizzante né su quello esternalizzante. Il funzionamento psicologico e comportamentale risulta complessivamente adeguato all'età.`;
  } else if(intBd!=="normale"&&(estBd==="normale")){
    commINT_EST=`Il profilo mostra una prevalenza di difficoltà internalizzanti, con un disagio che si esprime soprattutto attraverso sintomi emotivi e difficoltà relazionali piuttosto che attraverso comportamenti agiti verso l'esterno. Questo pattern richiede interventi focalizzati sull'ascolto emotivo e sul sostegno alla regolazione interna.`;
  } else if(estBd!=="normale"&&(intBd==="normale")){
    commINT_EST=`Il profilo mostra una prevalenza di difficoltà esternalizzanti, suggerendo una maggiore espressione del disagio attraverso il comportamento piuttosto che attraverso sintomi emotivi interni. Le difficoltà tendono a manifestarsi nelle relazioni e nei contesti strutturati, richiedendo interventi centrati sulla regolazione comportamentale.`;
  } else if(intBd!=="normale"&&estBd!=="normale"){
    if(intV>=estV){
      commINT_EST=`Il profilo evidenzia difficoltà sia sul versante internalizzante che esternalizzante, con una lieve prevalenza della componente interna. La compresenza di disagio emotivo e difficoltà comportamentali suggerisce un quadro complesso che richiede un approccio integrato, attento sia alla sofferenza interiore che alle manifestazioni comportamentali.`;
    } else {
      commINT_EST=`Il profilo evidenzia difficoltà sia sul versante esternalizzante che internalizzante, con una lieve prevalenza della componente comportamentale. La compresenza di difficoltà emotive e agite richiede un intervento che lavori simultaneamente sulla regolazione emotiva e sul comportamento, evitando di affrontare solo la parte più visibile del disagio.`;
    }
  } else if(intBd==="borderline"||estBd==="borderline"){
    commINT_EST=`Uno o entrambi gli indicatori compositi si collocano in area borderline. Il quadro merita monitoraggio nel tempo per verificare se le difficoltà tendano a stabilizzarsi, ridursi o aggravarsi.`;
  }
  html+=`<div style="margin-top:10px;padding:12px 14px;background:#f8f8f7;border-radius:9px;font-size:13px;color:#444;line-height:1.7;border-left:3px solid #e8e8e6;">${commINT_EST}</div>`;
  html+=`<div style="margin-top:8px;padding:9px 12px;background:#f8f8f7;border-radius:8px;font-size:12px;color:#888;line-height:1.5;">Nota: per la scala Prosociale punteggi alti (6–10) = adeguato; punteggi bassi (0–4) = difficoltà.</div>`;
  document.getElementById("dp-scale").innerHTML=html;
}

function renderRadar(){
  if(!currentEntry||!window.Chart)return;
  if(radarChart){radarChart.destroy();}
  const canvas=document.getElementById("radar-canvas");
  if(!canvas)return;
  const e=currentEntry;
  radarChart=new Chart(canvas,{type:"radar",data:{labels:["Sintomi Emotivi","Iperattività","Prob. Condotta","Prob. Relazioni","Prosociale"],datasets:[{label:"Punteggio",data:[e.scores.ES,e.scores.IP,e.scores.EC,e.scores.C,e.scores.PR],backgroundColor:"rgba(29,158,117,0.15)",borderColor:"#1D9E75",borderWidth:2,pointBackgroundColor:"#1D9E75",pointRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{r:{min:0,max:10,ticks:{stepSize:2,font:{size:10},color:"#aaa"},pointLabels:{font:{size:11},color:"#555"},grid:{color:"rgba(0,0,0,0.07)"},angleLines:{color:"rgba(0,0,0,0.07)"}}}}});
}

};

    const v=allSc[s];const bd=getBand(s,v);
    const col=bd==="normale"||bd==="adeguato"?"#1D9E75":bd==="borderline"?"#BA7517":"#A32D2D";

      <div class="interp-header"><span style="font-size:13px;font-weight:600;">${SLBL[s]}</span><div style="display:flex;align-items:center;gap:6px;"><span style="font-size:14px;font-weight:700;">${v}</span><span class="badge ${bClass(bd)}">${bLabel(bd)}</span></div></div>

  const interpEST={normale:"Il punteggio di esternalizzazione (problemi di condotta + iperattività) rientra nella norma. Non emergono pattern problematici di comportamento agito.",borderline:"Il punteggio di esternalizzazione si colloca in area borderline. Il ragazzo/a mostra alcune difficoltà nell'autoregolazione e nel comportamento che meritano monitoraggio.",elevato:"Il punteggio di esternalizzazione è clinicamente significativo. La combinazione di problemi di condotta e iperattività indica difficoltà marcate nell'autoregolazione emotiva e comportamentale, con ricadute sul contesto scolastico e relazionale."};
  html+=`<div style="margin-top:1rem;border-top:1px solid #f0f0ee;padding-top:1rem;"><p style="font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem;">Indicatori compositi</p>`;
  html+=`<div class="interp-block" style="border-left-color:${intBd==="normale"?"#1D9E75":intBd==="borderline"?"#BA7517":"#A32D2D"};">
    <div class="interp-header"><span style="font-size:13px;font-weight:600;">Internalizzazione (ES+C)</span><div style="display:flex;align-items:center;gap:6px;"><span style="font-size:14px;font-weight:700;">${intV}/20</span><span class="badge ${bClass(intBd)}">${bLabel(intBd)}</span></div></div>
    <p>${interpINT[intBd]}</p>
  </div>`;
  html+=`<div class="interp-block" style="border-left-color:${estBd==="normale"?"#1D9E75":estBd==="borderline"?"#BA7517":"#A32D2D"};">
    <div class="interp-header"><span style="font-size:13px;font-weight:600;">Esternalizzazione (EC+IP)</span><div style="display:flex;align-items:center;gap:6px;"><span style="font-size:14px;font-weight:700;">${estV}/20</span><span class="badge ${bClass(estBd)}">${bLabel(estBd)}</span></div></div>
    <p>${interpEST[estBd]}</p>

function renderRelazione(){
  const e=currentEntry;
  const nome=e.nome||"Il ragazzo/la ragazza";
  function s(sc){return{v:e.scores[sc]||e.tot,bd:getBand(sc,e.scores[sc]||e.tot)};}
  const ES=s("ES"),IP=s("IP"),EC=s("EC"),C=s("C"),PR={v:e.scores.PR,bd:getBand("PR",e.scores.PR)},TOT={v:e.tot,bd:getBand("TOT",e.tot)};
  const intV=e.scores.ES+e.scores.C; const estV=e.scores.EC+e.scores.IP;
  const intBd=getBand("INT",intV); const estBd=getBand("EST",estV);
  const livTot=TOT.bd==="normale"?"nella norma":TOT.bd==="borderline"?"in area borderline":"clinicamente significativo";
  let rec=[];
  if(ES.bd!=="normale")rec.push("un approfondimento della dimensione emotiva e dei vissuti ansiosi");
  if(IP.bd!=="normale")rec.push("una valutazione delle capacità attentive e dell'autoregolazione");
  if(EC.bd!=="normale")rec.push("un intervento strutturato sulla gestione del comportamento");
  if(C.bd!=="normale")rec.push("un supporto alle abilità sociali e al senso di appartenenza al gruppo");
  if(PR.bd==="basso")rec.push("un potenziamento delle competenze empatiche e prosociali");
  const recStr=rec.length?rec.join(", ")+".":"un monitoraggio periodico nel tempo per verificare la stabilità del profilo.";

  let analisi=[];
  const aree=[];
  if(ES.bd!=="normale")aree.push("emotiva");if(IP.bd!=="normale")aree.push("dell'autoregolazione");if(EC.bd!=="normale")aree.push("comportamentale");if(C.bd!=="normale")aree.push("relazionale");
  if(TOT.bd==="normale"){analisi.push(`Il profilo complessivo di ${nome} non evidenzia aree di difficoltà clinicamente significative. I punteggi si collocano entro i valori normativi.`);}
  else if(TOT.bd==="borderline"){analisi.push(`Il profilo di ${nome} presenta alcune aree di vulnerabilità in zona borderline.`);if(aree.length)analisi.push(`Le aree di maggiore attenzione riguardano la dimensione ${aree.join(", ")}.`);}
  else{analisi.push(`Il profilo di ${nome} evidenzia difficoltà significative in più domini.`);if(aree.length)analisi.push(`Le dimensioni più critiche sono quella ${aree.join(", ")}.`);}
  if(PR.bd==="adeguato")analisi.push("Il comportamento prosociale è un punto di forza su cui fare leva nel progetto educativo.");
  else if(PR.bd==="basso")analisi.push("Il comportamento prosociale è poco sviluppato, con possibili difficoltà nell'empatia e cooperazione.");
  if(ES.bd==="elevato"&&C.bd==="elevato")analisi.push("La compresenza di sintomi emotivi e difficoltà relazionali suggerisce un circolo disfunzionale tra sofferenza interiore e isolamento.");
  if(IP.bd==="elevato"&&EC.bd==="elevato")analisi.push("L'associazione tra iperattività e problemi di condotta può indicare difficoltà di autoregolazione con ricadute sul comportamento agito.");

  let impl=[];
  if(ES.bd!=="normale")impl.push("Sul piano emotivo, si raccomanda di creare spazi di ascolto strutturati. Tecniche di psicoeducazione emotiva e gestione dell'ansia possono risultare efficaci.");
  if(IP.bd!=="normale")impl.push("Per l'autoregolazione, è utile strutturare l'ambiente con routine chiare e tempi definiti. Strategie metacognitive e pause strutturate possono migliorare la concentrazione.");
  if(EC.bd!=="normale")impl.push("Per la gestione del comportamento, si raccomanda un approccio basato su regole chiare, conseguenze prevedibili e rinforzo positivo.");
  if(C.bd!=="normale")impl.push("Per l'integrazione sociale, possono essere utili attività di gruppo strutturate e training sulle abilità sociali.");
  if(PR.bd==="basso")impl.push("Il potenziamento prosociale può avvenire tramite cooperative learning, role-playing e valorizzazione degli episodi di aiuto e cooperazione.");
  if(!impl.length)impl.push("Il profilo non evidenzia aree critiche. Si suggerisce di valorizzare i punti di forza e mantenere un monitoraggio periodico del benessere.");

  document.getElementById("dp-rel").innerHTML=`<p class="lbl">Relazione psicoeducativa</p>
  <div style="border:1px solid #e8e8e6;border-radius:12px;padding:1.25rem;">
    <div class="rel-section"><h4>Dati identificativi</h4><p>Nome: <strong>${nome}</strong>${e.ddn?" · Nato/a: "+e.ddn:""}${e.sesso?" · "+e.sesso:""}.<br>Data somministrazione: ${e.data}. Strumento: SDQ auto-report 11–17 anni, standardizzazione italiana.</p></div>
    <div class="rel-section"><h4>Presentazione dello strumento</h4><p>L'SDQ (Goodman, 1997) è un questionario di screening psicologico validato internazionalmente. Valuta cinque dimensioni: sintomi emotivi, iperattività/disattenzione, problemi di condotta, difficoltà nelle relazioni con i pari e comportamento prosociale. Il punteggio totale di difficoltà (range 0–40) somma le prime quattro scale. Per la scala Prosociale, a differenza delle altre, punteggi più alti indicano funzionamento migliore.</p></div>
    <div class="rel-section"><h4>Profilo dei punteggi</h4><p>Il punteggio totale di difficoltà è <strong>${TOT.v}/40</strong>, collocandosi <strong>${livTot}</strong> secondo le norme italiane.</p>
    <ul style="margin-top:8px;padding-left:16px;font-size:13px;color:#555;line-height:2;">
      <li><strong>Sintomi Emotivi (ES):</strong> ${ES.v}/10 — <span class="badge ${bClass(ES.bd)}">${bLabel(ES.bd)}</span></li>
      <li><strong>Iperattività/Disattenzione (IP):</strong> ${IP.v}/10 — <span class="badge ${bClass(IP.bd)}">${bLabel(IP.bd)}</span></li>
      <li><strong>Problemi di Condotta (EC):</strong> ${EC.v}/10 — <span class="badge ${bClass(EC.bd)}">${bLabel(EC.bd)}</span></li>
      <li><strong>Difficoltà Relazioni con i Pari (C):</strong> ${C.v}/10 — <span class="badge ${bClass(C.bd)}">${bLabel(C.bd)}</span></li>
      <li><strong>Comportamento Prosociale (PR):</strong> ${PR.v}/10 — <span class="badge ${bClass(PR.bd)}">${bLabel(PR.bd)}</span></li>
    </ul>
    <p style="margin-top:10px;">Gli indicatori compositi mostrano: <strong>Internalizzazione</strong> (ES+C) = ${intV}/20 <span class="badge ${bClass(intBd)}">${bLabel(intBd)}</span> e <strong>Esternalizzazione</strong> (EC+IP) = ${estV}/20 <span class="badge ${bClass(estBd)}">${bLabel(estBd)}</span>.</p>
    </div>
    <div class="rel-section"><h4>Analisi del profilo</h4><p>${analisi.join(" ")}</p></div>
    <div class="rel-section"><h4>Implicazioni psicoeducative</h4><p>${impl.join(" ")}</p></div>
    <div class="rel-section"><h4>Raccomandazioni</h4><p>Sulla base del profilo emerso, si suggerisce ${recStr}</p><p style="margin-top:8px;">L'SDQ è uno strumento di screening e non consente diagnosi. I risultati vanno contestualizzati in una valutazione globale del ragazzo/a nel suo contesto familiare, scolastico e relazionale.</p></div>
    <div class="rel-section" style="margin-bottom:0;"><h4>Note conclusive</h4><p>La presente relazione è redatta a scopo informativo e di supporto alla programmazione educativa. Non sostituisce una valutazione psicologica condotta da professionisti abilitati. Si raccomanda la massima riservatezza nel trattamento dei dati.</p></div>
  </div>`;
}

function renderImpact(){
  const e=currentEntry;
  const imp=e.impact||{};
  const dgMap={0:"No",1:"Sì, piccole difficoltà",2:"Sì, difficoltà importanti",3:"Sì, difficoltà molto grandi"};
  const durMap={1:"Meno di 1 mese",2:"1–5 mesi",3:"6–12 mesi",4:"Più di 1 anno"};
  const lvlMap={0:"Per niente",1:"Solo un pò",2:"Abbastanza",3:"Molto"};
  const rows=[["Difficoltà percepita",imp.diff_gen!=null?dgMap[imp.diff_gen]:"—"],["Durata",imp.durata!=null?durMap[imp.durata]:"—"],["Sofferenza soggettiva",imp.soff!=null?lvlMap[imp.soff]:"—"],["Vita familiare",imp.i_fam!=null?lvlMap[imp.i_fam]:"—"],["Amicizie",imp.i_ami!=null?lvlMap[imp.i_ami]:"—"],["Scuola",imp.i_scu!=null?lvlMap[imp.i_scu]:"—"],["Tempo libero",imp.i_lib!=null?lvlMap[imp.i_lib]:"—"],["Carico sugli altri",imp.i_altri!=null?lvlMap[imp.i_altri]:"—"]];

  const nome=e.nome||"Il ragazzo/la ragazza";
  const isEst=(getBand("EC",e.scores.EC)!=="normale"||getBand("IP",e.scores.IP)!=="normale");
  const isInt=(getBand("ES",e.scores.ES)!=="normale"||getBand("C",e.scores.C)!=="normale");

  let c=`<p style="font-size:13px;color:#555;line-height:1.75;margin-bottom:1rem;">La sezione Impatto (Impact Supplement) non misura la gravità delle scale, ma quanto le difficoltà incidono concretamente nella vita quotidiana di ${nome}. Permette di capire <em>dove</em> e <em>come</em> il disagio si manifesta nel reale.</p>`;

  function bloc(titolo,badge,badgeBg,badgeCol,borderCol,testo){
    return `<div class="interp-block" style="border-left-color:${borderCol};"><div class="interp-header"><span style="font-size:13px;font-weight:600;">${titolo}</span><span class="badge" style="background:${badgeBg};color:${badgeCol};">${badge}</span></div><p style="font-size:13px;color:#555;line-height:1.65;">${testo}</p></div>`;
  }

  if(imp.diff_gen!=null){
    const tt=[
      `${nome} non riconosce difficoltà significative. Può indicare scarsa consapevolezza del disagio o un funzionamento realmente adeguato nel quotidiano.`,
      `${nome} riconosce piccole difficoltà. La consapevolezza è parziale: il problema è percepito ma non vissuto come fonte importante di disagio.${isEst?" Questo è frequente nei profili esternalizzanti, dove il comportamento problematico non genera necessariamente sofferenza soggettiva.":""}`,
      `${nome} riconosce difficoltà importanti. Il livello di consapevolezza è significativo e le difficoltà vengono vissute con un certo peso personale.`,
      `${nome} riconosce difficoltà molto grandi. Il disagio è avvertito con chiarezza e intensità, il che può facilitare la motivazione al cambiamento ma richiede un supporto adeguato.`
    ];
    c+=bloc("Difficoltà percepita",dgMap[imp.diff_gen],"#E6F1FB","#0C447C","#378ADD",tt[imp.diff_gen]);
  }

  if(imp.durata!=null){
    const tt=[null,
      "La durata inferiore a un mese suggerisce un disagio acuto e recente. Potrebbe trattarsi di una reazione a un evento specifico piuttosto che di un pattern strutturato.",
      "Una durata di 1–5 mesi indica un disagio persistente ma relativamente recente. È importante capire se vi sia stato un evento scatenante o se si tratti di una tendenza in consolidamento.",
      "Una durata di 6–12 mesi indica che il pattern non è episodico. Le difficoltà si sono stabilizzate e necessitano di un intervento strutturato.",
      "Una durata superiore a un anno indica un pattern comportamentale o emotivo stabile, non una fase momentanea. Richiede interventi mirati e continuativi."
    ];
    c+=bloc("Durata",durMap[imp.durata],"#E6F1FB","#0C447C","#378ADD",tt[imp.durata]);
  }

  if(imp.soff!=null){
    const tt=[
      `${nome} non riferisce sofferenza personale. ${isEst?"Questo è frequente nei profili con difficoltà comportamentali: il disagio è percepito più dall'ambiente che dal soggetto stesso. Non implica assenza di problema, ma orienta l'intervento verso strategie esterne.":"È utile esplorare se questa assenza di sofferenza rifletta un reale equilibrio o una difficoltà nel riconoscere le proprie emozioni."}`,
      `${nome} riferisce una lieve sofferenza soggettiva. Il disagio è presente ma contenuto.`,
      `${nome} riferisce una sofferenza abbastanza significativa. Il peso emotivo delle difficoltà è percepito e va considerato nella progettazione dell'intervento educativo.`,
      `${nome} riferisce una sofferenza intensa. Questo livello di disagio richiede attenzione prioritaria e, se non già presente, l'attivazione di un supporto psicologico professionale.`
    ];
    c+=bloc("Sofferenza soggettiva",lvlMap[imp.soff],"#E6F1FB","#0C447C","#378ADD",tt[imp.soff]);
  }

  c+=`<p style="font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin:1rem 0 .5rem;">Aree di impatto nella vita quotidiana</p>`;

  const aree=[
    {k:"i_fam",n:"Vita familiare",tt:[
      "Il contesto familiare non risulta impattato. Le relazioni in famiglia sembrano funzionare adeguatamente.",
      "Il contesto familiare mostra un impatto lieve. Qualche tensione è presente ma non compromette il funzionamento quotidiano.",
      `Il contesto familiare è abbastanza impattato. ${isEst?"In molti profili con condotta elevata è proprio la famiglia il luogo dove la regolazione comportamentale è più difficile, perché i legami affettivi intensificano le reazioni emotive.":"Le dinamiche familiari sembrano amplificare il disagio. È utile coinvolgere la famiglia nel progetto educativo."}`,
      `Il contesto familiare è fortemente impattato. ${isEst?"I conflitti emergono soprattutto nel contesto domestico: il ragazzo/a fatica a regolare il comportamento laddove il legame affettivo è più intenso.":"Le difficoltà ricadono pesantemente sulla vita familiare. È fondamentale il coinvolgimento attivo della famiglia nel percorso di supporto."}`
    ]},
    {k:"i_ami",n:"Amicizie",tt:[
      "Le amicizie non sembrano influenzate. Il ragazzo/a mantiene relazioni sociali soddisfacenti.",
      "Le amicizie sono lievemente influenzate. Qualche attrito relazionale è presente ma non compromette i legami.",
      `Le amicizie sono abbastanza influenzate. ${isEst?"Le relazioni possono essere turbolente pur mantenendosi. L'impulsività o la tendenza al conflitto emergono anche in questo contesto.":"Le difficoltà cominciano a incidere sui rapporti con i pari. È un segnale da monitorare."}`,
      "Le amicizie sono fortemente influenzate. Le difficoltà relazionali impattano significativamente sulla rete sociale, con rischio di isolamento o conflitti ripetuti."
    ]},
    {k:"i_scu",n:"Scuola",tt:[
      "Il contesto scolastico non è percepito come area critica. Questo può indicare che il ragazzo/a riesce a regolare meglio il comportamento in ambienti strutturati con regole chiare.",
      "L'impatto a scuola è lieve. Le difficoltà non compromettono significativamente il funzionamento scolastico.",
      "L'impatto a scuola è abbastanza significativo. Le difficoltà cominciano a interferire con l'apprendimento o con le relazioni nel contesto scolastico.",
      "L'impatto a scuola è molto elevato. È necessario un coordinamento tra équipe educativa e istituzione scolastica."
    ]},
    {k:"i_lib",n:"Tempo libero",tt:[
      "Il tempo libero non è influenzato. Il ragazzo/a riesce a gestire autonomamente i momenti non strutturati.",
      "L'impatto sul tempo libero è lieve. Qualche difficoltà emerge ma non compromette le attività.",
      `Il tempo libero è abbastanza influenzato. ${isEst?"Nei contesti meno strutturati emergono più facilmente impulsività e conflitti, perché le regole sono meno chiare e il controllo esterno è ridotto.":"Le difficoltà si manifestano anche nei momenti di svago, limitando il benessere del ragazzo/a."}`,
      `Il tempo libero è fortemente influenzato. ${isEst?"L'assenza di struttura amplifica le difficoltà di autoregolazione: è il luogo dove emergono di più impulsività e conflitti tra pari.":"Le difficoltà pervadono anche i momenti di svago, riducendo significativamente la qualità di vita percepita."}`
    ]},
    {k:"i_altri",n:"Carico sugli altri",tt:[
      "Le difficoltà non sembrano pesare sulle persone vicine. L'impatto sull'ambiente circostante è minimo.",
      "Le difficoltà pesano lievemente sugli altri. Chi è vicino avverte qualche tensione ma riesce a gestirla.",
      "Le difficoltà pesano abbastanza sugli altri. Familiari, insegnanti e amici avvertono il peso del comportamento o del disagio del ragazzo/a.",
      `Le difficoltà pesano molto sugli altri. ${imp.soff===0?"Anche se il ragazzo/a non percepisce sofferenza personale, riconosce che il suo comportamento pesa sull'ambiente: è una forma embrionale di consapevolezza sociale da valorizzare nel percorso educativo.":"Il carico sugli altri è elevato. È importante prevenire dinamiche di esaurimento o conflitto cronico nell'ambiente circostante."}`
    ]}
  ];

  aree.forEach(({k,n,tt})=>{
