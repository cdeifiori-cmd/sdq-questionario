<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>SDQ — Questionario Ragazzi</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:15px;}
.container{max-width:680px;margin:0 auto;padding:1.5rem 1rem 4rem;}
h1{font-size:22px;font-weight:600;margin-bottom:4px;}
.sub{font-size:14px;color:#666;margin-bottom:1.5rem;line-height:1.5;}
.card{background:#fff;border-radius:12px;padding:1.25rem;margin-bottom:1rem;border:1px solid #e8e8e6;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem;}
@media(max-width:480px){.info-grid{grid-template-columns:1fr;}}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:13px;color:#666;font-weight:500;}
.field input,.field select{border:1px solid #d0d0ce;border-radius:8px;padding:10px 12px;font-size:15px;background:#fff;color:#1a1a1a;width:100%;}
.field input:focus,.field select:focus{outline:none;border-color:#1D9E75;}
.counter-bar{background:#fff;border-radius:8px;padding:10px 14px;margin-bottom:1rem;border:1px solid #e8e8e6;display:flex;align-items:center;gap:12px;}
.counter-track{flex:1;background:#e8e8e6;border-radius:4px;height:6px;overflow:hidden;}
.counter-fill{height:6px;background:#1D9E75;border-radius:4px;transition:width .3s;}
.counter-txt{font-size:12px;color:#666;white-space:nowrap;}
.item-row{padding:12px 0;border-bottom:1px solid #f0f0ee;}
.item-row:last-child{border-bottom:none;}
.item-text{font-size:14px;color:#1a1a1a;line-height:1.5;margin-bottom:10px;}
.item-num{font-size:12px;color:#aaa;margin-right:4px;}
.radio-group{display:flex;border:1px solid #d0d0ce;border-radius:8px;overflow:hidden;}
.radio-group label{flex:1;text-align:center;padding:9px 4px;font-size:12px;color:#555;cursor:pointer;border-right:1px solid #d0d0ce;transition:background .15s,color .15s;line-height:1.3;display:flex;flex-direction:column;align-items:center;gap:4px;}
.radio-group label:last-child{border-right:none;}
.radio-group input[type="radio"]{display:none;}
.radio-dot{width:16px;height:16px;border-radius:50%;border:2px solid #d0d0ce;transition:all .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.radio-group label.selected{color:#0F6E56;font-weight:500;background:#f0faf6;}
.radio-group label.selected .radio-dot{border-color:#1D9E75;background:#1D9E75;}
.radio-group label.selected .radio-dot::after{content:'';width:6px;height:6px;border-radius:50%;background:#fff;display:block;}
.impact-q{margin-bottom:1rem;}
.impact-q p{font-size:14px;color:#1a1a1a;margin-bottom:8px;line-height:1.5;}
.impact-opts{display:flex;flex-direction:column;gap:6px;}
.impact-opt{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid #e0e0de;border-radius:8px;cursor:pointer;transition:all .15s;}
.impact-opt:hover{border-color:#1D9E75;background:#f0faf6;}
.impact-opt input[type="radio"]{accent-color:#1D9E75;width:16px;height:16px;flex-shrink:0;}
.impact-opt span{font-size:14px;color:#444;}
.impact-opt.selected{border-color:#1D9E75;background:#f0faf6;}
.warn{font-size:13px;color:#c0392b;margin-top:8px;padding:10px 12px;background:#fdf0ef;border-radius:8px;display:none;}
.btn{width:100%;padding:14px;font-size:16px;font-weight:600;border-radius:10px;border:none;cursor:pointer;margin-top:1rem;}
.btn-primary{background:#1D9E75;color:#fff;}
.btn-primary:hover{background:#0F6E56;}
.btn-primary:disabled{background:#a0cfc2;cursor:not-allowed;}
.divider{height:1px;background:#e8e8e6;margin:1.5rem 0;}
.thanks-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:1rem;text-align:center;padding:2rem;}
.thanks-icon{width:72px;height:72px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;font-size:36px;}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="container">

<div id="screen-thanks" style="display:none;">
    <div style="display:flex;flex-direction:column;align-items:center;min-height:60vh;justify-content:center;gap:1rem;text-align:center;padding:2rem;">
      <div style="width:64px;height:64px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;font-size:32px;">&#10003;</div>
      <h2 style="font-size:22px;font-weight:600;">Grazie per aver risposto!</h2>
      <p style="font-size:14px;color:#666;max-width:300px;line-height:1.6;">Le tue risposte sono state registrate correttamente.</p>
      <p style="font-size:14px;color:#666;max-width:280px;line-height:1.6;margin-top:-4px;">Le tue risposte sono state registrate. Puoi chiudere questa pagina.</p>
    </div>
  </div>


</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBmsHeTkQMJVQyav3rF8VPMhLeIB45t3Io",
  authDomain: "sdq-questionario.firebaseapp.com",
  projectId: "sdq-questionario",
  storageBucket: "sdq-questionario.firebasestorage.app",
  messagingSenderId: "601788476480",
  appId: "1:601788476480:web:766d7dd791fa44acbd83a5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ITEMS=[
  {t:"Cerco di essere gentile verso gli altri; sono rispettoso dei loro sentimenti",s:"PR",r:false},
  {t:"Sono agitato/a, non riesco a stare fermo per molto tempo",s:"IP",r:false},
  {t:"Soffro spesso mal di testa, mal di stomaco o nausea",s:"ES",r:false},
  {t:"Condivido volentieri con gli altri (dolci, giocattoli, matite ecc.)",s:"PR",r:false},
  {t:"Spesso ho delle crisi di collera o sono di cattivo umore",s:"EC",r:false},
  {t:"Sono piuttosto solitario/a, tendo a giocare da solo",s:"C",r:false},
  {t:"Generalmente sono obbediente e faccio quello che mi è stato detto",s:"EC",r:true},
  {t:"Ho molte preoccupazioni",s:"ES",r:false},
  {t:"Sono di aiuto se qualcuno si fa male, è arrabbiato o malato",s:"PR",r:false},
  {t:"Sono costantemente in movimento; spesso mi sento a disagio",s:"IP",r:false},
  {t:"Ho almeno un buon amico o una buona amica",s:"C",r:true},
  {t:"Spesso litigo. Costringo gli altri a fare quello che voglio",s:"EC",r:false},
  {t:"Sono spesso infelice o triste; piango facilmente",s:"ES",r:false},
  {t:"Generalmente sono ben accettato/a dalle persone della mia età",s:"C",r:true},
  {t:"Sono facilmente distratto/a; trovo difficile concentrarmi",s:"IP",r:false},
  {t:"Le situazioni nuove mi rendono nervoso/a, mi sento poco sicuro di me stesso",s:"ES",r:false},
  {t:"Sono gentile con i bambini piccoli",s:"PR",r:false},
  {t:"Sono spesso accusato/a di essere un bugiardo o un ingannatore/trice",s:"EC",r:false},
  {t:"Sono preso/a di mira e preso/a in giro dalle persone della mia età",s:"C",r:false},
  {t:"Sono spesso volontario per aiutare gli altri (genitori, insegnanti, bambini)",s:"PR",r:false},
  {t:"Penso prima di fare qualcosa",s:"IP",r:true},
  {t:"Ho rubato degli oggetti che non mi appartenevano da casa, da scuola o da altri posti",s:"EC",r:false},
  {t:"Ho migliori rapporti con gli adulti che con le persone della mia età",s:"C",r:false},
  {t:"Ho molte paure, mi spavento facilmente",s:"ES",r:false},
  {t:"Sono in grado di finire ciò che mi viene chiesto; rimango concentrato/a per tutto il tempo necessario",s:"IP",r:true}
];

const itemsCard = document.getElementById("items-card");
ITEMS.forEach((item, i) => {
  const div = document.createElement("div");
  div.className = "item-row";
  div.innerHTML = `<div class="item-text"><span class="item-num">${i+1}.</span>${item.t}</div>
    <div class="radio-group">
      <label id="lbl-${i}-0"><input type="radio" name="q${i}" value="0" onchange="window.onRadio(${i})"><span class="radio-dot"></span>Non vero</label>
      <label id="lbl-${i}-1"><input type="radio" name="q${i}" value="1" onchange="window.onRadio(${i})"><span class="radio-dot"></span>Parz. vero</label>
      <label id="lbl-${i}-2"><input type="radio" name="q${i}" value="2" onchange="window.onRadio(${i})"><span class="radio-dot"></span>Assol. vero</label>
    </div>`;
  itemsCard.appendChild(div);
});

window.onRadio = function(i) {
  [0,1,2].forEach(v => {
    const lbl = document.getElementById(`lbl-${i}-${v}`);
    lbl.classList.toggle("selected", lbl.querySelector("input").checked);
  });
  let c=0; for(let j=0;j<25;j++){if(document.querySelector(`input[name="q${j}"]:checked`))c++;}
  document.getElementById("counter-fill").style.width=(c/25*100)+"%";
  document.getElementById("counter-txt").textContent=c+" di 25";
};

document.querySelectorAll('.impact-opt input[type="radio"]').forEach(r => {
  r.addEventListener("change", function() {
    document.querySelectorAll(`.impact-opt input[name="${this.name}"]`).forEach(inp => inp.closest(".impact-opt").classList.remove("selected"));
    this.closest(".impact-opt").classList.add("selected");
    if(this.name==="diff_gen") document.getElementById("impact-extra").style.display=parseInt(this.value)>0?"block":"none";
  });
});

function getRad(name){const r=document.querySelector(`input[name="${name}"]:checked`);return r?parseInt(r.value):null;}

window.submitForm = async function() {
  const warn=document.getElementById("form-warn");
  for(let i=0;i<25;i++){if(!document.querySelector(`input[name="q${i}"]:checked`)){warn.style.display="block";warn.scrollIntoView({behavior:"smooth",block:"center"});return;}}
  if(!document.getElementById("f-codice").value.trim()){
    warn.textContent="Inserisci il codice pratica prima di inviare.";
    warn.style.display="block";
    document.getElementById("f-codice").focus();
    return;
  }
  warn.style.display="none";
  const btn=document.getElementById("submit-btn");
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>Invio in corso...';
  const sc={ES:0,IP:0,EC:0,C:0,PR:0};
  const raw=[];ITEMS.forEach((item,i)=>{let v=parseInt(document.querySelector(`input[name="q${i}"]:checked`).value);raw.push(v);if(item.r)v=2-v;sc[item.s]+=v;});
  const tot=sc.ES+sc.IP+sc.EC+sc.C;
  const dg=document.querySelector('input[name="diff_gen"]:checked');
  const codice = (document.getElementById("f-codice").value||"00").padStart(2,"0");
  const entry={
    tipo:"auto-report",
    codice:codice,
    nome:document.getElementById("f-nome").value||"Anonimo",
    ddn:document.getElementById("f-ddn").value,
    sesso:document.getElementById("f-sesso").value,
    data:document.getElementById("f-data").value||new Date().toISOString().split("T")[0],
    timestamp:new Date(),
    scores:sc,tot,raw,
    impact:{diff_gen:dg?parseInt(dg.value):null,durata:getRad("durata"),soff:getRad("soff"),i_fam:getRad("i_fam"),i_ami:getRad("i_ami"),i_scu:getRad("i_scu"),i_lib:getRad("i_lib"),i_altri:getRad("i_altri")}
  };
  try {
    await addDoc(collection(db,"risposte"),entry);
    document.getElementById("screen-form").style.display="none";
    document.getElementById("screen-thanks").style.display="block";
    window.scrollTo(0,0);
  } catch(e) {
    btn.disabled=false;
    btn.innerHTML="Invia le risposte";
    alert("Errore nell'invio. Controlla la connessione e riprova.");
  }
};


document.getElementById("f-data").value=new Date().toISOString().split("T")[0];
</script>
</body>
</html>
